<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速區網相機串流 (PeerJS 鏡像優化版)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #1a1a1a; color: #fff; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; background: #2a2a2a; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #fff; }
        
        /* 影片視窗基礎設定 */
        .video-wrapper { position: relative; width: 100%; max-height: 400px; background: #000; border-radius: 8px; overflow: hidden; margin: 15px 0; }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }
        
        /* 依據鏡像狀態切換（預設手機傳送端鏡像翻轉） */
        .mirror { transform: scaleX(-1); }
        
        .btn { display: inline-block; padding: 12px 24px; background: #00b359; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; width: 100%; box-sizing: border-box; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        
        .info-panel { background: #333; padding: 15px; border-radius: 8px; text-align: left; margin-top: 15px; font-size: 14px; line-height: 1.6; }
        .info-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .info-value { font-family: monospace; color: #00ff88; font-weight: bold; word-break: break-all; }
        
        /* 鏡像開關 UI */
        .switch-container { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #555; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #00b359; }
        input:checked + .slider:before { transform: translateX(24px); }
        
        .status { color: #ffcc00; font-weight: bold; margin: 10px 0; }
        .copy-btn { background: #444; color: #fff; border: none; padding: 2px 6px; border-radius: 4px; cursor: pointer; margin-left: 5px; font-size: 11px; }
        .copy-btn:hover { background: #555; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>區網相機串流系統</h2>
    <div id="status" class="status">正在初始化系統...</div>

    <div class="video-wrapper">
        <video id="main-video" autoplay playsinline muted></video>
    </div>

    <div id="sender-ui" class="hidden">
        <button id="start-btn" class="btn">開啟相機並傳送</button>
        
        <div class="info-panel">
            <h3 style="margin-top:0; color:#ffcc00;">📊 傳輸資訊</h3>
            <div class="info-item">
                <span>代碼 (Peer ID)：</span>
                <span>
                    <span id="peer-id-display" class="info-value">等待生成...</span>
                    <button id="copy-id-btn" class="copy-btn" class="hidden">複製</button>
                </span>
            </div>
            <div class="info-item"><span>當前解析度：</span><span class="info-value">1920x1080 (1080p)</span></div>
            <div class="info-item"><span>網路模式：</span><span class="info-value">WebRTC 區網 P2P</span></div>
            <div class="info-item"><span>延遲時間：</span><span class="info-value" style="color:#00ff88;">&lt; 0.2s (超低延遲)</span></div>
            
            <div class="switch-container">
                <span>鏡像輸出影像 (左右翻轉)</span>
                <label class="switch">
                    <input type="checkbox" id="mirror-switch" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="receiver-ui" class="hidden">
        <div class="info-panel" style="text-align: center;">
            <p>💻 <b>這是【OBS 接收端】</b></p>
            <p style="color:#aaa; font-size:12px;">正在等待手機連線，請確保手機端已開啟相機。</p>
        </div>
    </div>
</div>

<script>
const videoEl = document.getElementById('main-video');
const statusDiv = document.getElementById('status');
const mirrorSwitch = document.getElementById('mirror-switch');

// 1. 檢查網址參數，區分是手機還是 OBS
const urlParams = new URLSearchParams(window.location.search);
const targetPeerId = urlParams.get('peerId'); // OBS 抓取手機用的 ID
const isReceiver = !!targetPeerId;

let peer;

// 初始化設定：手機預設開啟鏡像翻轉，OBS 預設不翻轉
if (isReceiver) {
    document.getElementById('receiver-ui').classList.remove('hidden');
    videoEl.classList.remove('mirror'); // OBS 畫面通常不鏡像
    statusDiv.innerText = "🔌 正在嘗試連線至手機...";
    initReceiver(targetPeerId);
} else {
    document.getElementById('sender-ui').classList.remove('hidden');
    videoEl.classList.add('mirror'); // 手機自拍預設鏡像，比較符合直覺
    statusDiv.innerText = "📱 傳送端已就緒";
    initSender();
}

// 鏡像開關即時控制切換
mirrorSwitch.addEventListener('change', (e) => {
    if (e.target.checked) {
        videoEl.classList.add('mirror');
    } else {
        videoEl.classList.remove('mirror');
    }
});

// ================= 📱 手機傳送端邏輯 =================
function initSender() {
    // 建立 Peer 節點，讓 PeerJS 隨機分配一個簡短的 ID
    peer = new Peer({
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', (id) => {
        document.getElementById('peer-id-display').innerText = id;
        document.getElementById('copy-id-btn').classList.remove('hidden');
        statusDiv.innerText = "🟢 請點擊下方按鈕開啟直播";
        
        // 點擊複製代碼功能
        document.getElementById('copy-id-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(id);
            alert('代碼已複製！');
        });
    });

    document.getElementById('start-btn').addEventListener('click', async () => {
        try {
            statusDiv.innerText = "正在獲取高清相機權限...";
            
            // 針對低延遲、高畫質進行參數調教 (1080p, 60fps 優先)
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { ideal: "environment" }, // 優先用後鏡頭
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    frameRate: { ideal: 60, max: 60 } // 鎖定高幀率減少殘影
                },
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true
                }
            });

            videoEl.srcObject = stream;
            document.getElementById('start-btn').disabled = true;
            statusDiv.innerText = "📡 畫面已就緒！等待 OBS 連入...";

            // 當有接收端（OBS）打電話進來時，把畫面串流送過去
            peer.on('call', (call) => {
                statusDiv.innerText = "⚡ OBS 已成功連線，正在傳輸影音！";
                call.answer(stream);
            });

        } catch (err) {
            statusDiv.innerText = "❌ 無法開啟相機: " + err.message;
            alert("請檢查瀏覽器的相機權限是否開啟！");
        }
    });
}

// ================= 💻 OBS 接收端邏輯 =================
function initReceiver(id) {
    peer = new Peer({
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', () => {
        // 主動向手機端發起連線（呼叫）
        // 由於 OBS 只需要收畫面，我們傳送一個空的 MediaStream
        const fakeStream = new MediaStream();
        const call = peer.call(id, fakeStream);

        call.on('stream', (remoteStream) => {
            videoEl.srcObject = remoteStream;
            statusDiv.innerText = "🟢 已成功取得手機畫面！";
        });

        call.on('error', (err) => {
            statusDiv.innerText = "❌ 連線失敗: " + err.message;
        });
    });
}
</script>
</body>
</html>
